  #     # Configuracoes do MinIO
  #     MinIO__Endpoint: minio:9000
  #     MinIO__AccessKey: admin
  #     MinIO__SecretKey: admin123456
  #     MinIO__UseSSL: false
  #     MinIO__Region: us-east-1
  #     MinIO__BucketReports: simulation-reports
  #     MinIO__BucketLogs: banking-logs
  #     MinIO__BucketBackups: banking-backups
  #     MinIO__BucketExports: banking-exports
      
  #     # Configuracoes de simulacao
  #     Simulation__AutoRun: false
  #     Simulation__IntervalMinutes: 10
  #     Simulation__SaveToMinIO: true
      
  #     # Configuracoes de logging
  #     Logging__LogLevel__Default: Information
