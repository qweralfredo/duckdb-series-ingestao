  #   volumes:
  #     - simulation-reports:/app/SimulationReports
  #   networks:
  #     - banking-network
  #   healthcheck:
  #     test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 40s
  #   restart: unless-stopped

  # Init container para criar topicos Kafka
  kafka-init:
    image: confluentinc/cp-kafka:7.4.0
    container_name: banking-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - banking-network
    entrypoint: ["/bin/bash", "-c"]
    command: >
      sleep 10 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic banking-transacao-solicitada --partitions 3 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic banking-transacao-processada --partitions 3 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic banking-saldo-atualizado --partitions 3 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic banking-conta-criada --partitions 2 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic banking-pessoa-criada --partitions 2 --replication-factor 1 &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --topic banking-empresa-criada --partitions 2 --replication-factor 1 &&
      echo 'Topicos Kafka criados:' &&
      kafka-topics --list --bootstrap-server kafka:29092

# Volumes para persistencia
volumes:
  simulation-reports:
    driver: local
  minio-data:
    driver: local

# Rede personalizada
networks:
  banking-network:
    driver: bridge
    name: banking-network